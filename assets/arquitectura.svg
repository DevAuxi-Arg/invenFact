<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 980" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <rect width="1120" height="980" rx="14" fill="#ffffff"/>

  <!-- ============ CLIENTES ============ -->
  <rect x="20" y="20" width="780" height="86" rx="10" fill="#f4f6f8" stroke="#d0d7de"/>
  <text x="410" y="42" text-anchor="middle" font-size="13" font-weight="700" fill="#444c56" letter-spacing="1">CLIENTES</text>
  <rect x="44" y="52" width="352" height="42" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="220" y="78" text-anchor="middle" font-size="12.5" fill="#1f2328">Navegador (HTML)</text>
  <rect x="412" y="52" width="352" height="42" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="588" y="78" text-anchor="middle" font-size="12.5" fill="#1f2328">Aplicaciones / Clientes (API JSON)</text>
  <path d="M220 106 V128" stroke="#8a93a6" stroke-width="1.6" marker-end="url(#a)"/>
  <path d="M588 106 V128" stroke="#8a93a6" stroke-width="1.6" marker-end="url(#a)"/>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8a93a6"/>
    </marker>
  </defs>

  <!-- ============ CAPA 1 — PRESENTACIÓN ============ -->
  <rect x="20" y="132" width="780" height="196" rx="10" fill="#f1ecfb" stroke="#d8c9f0"/>
  <rect x="20" y="132" width="60" height="196" rx="10" fill="#6f42c1"/>
  <text x="50" y="162" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">1</text>
  <text transform="translate(43,235) rotate(-90)" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="1">PRESENTACIÓN</text>
  <text x="440" y="156" text-anchor="middle" font-size="15" font-weight="700" fill="#5a32a3">Capa de Presentación</text>

  <rect x="92" y="168" width="212" height="118" rx="8" fill="#fff" stroke="#e3d7f5"/>
  <text x="104" y="190" font-size="12.5" font-weight="700" fill="#1f2328">Web MVC (@Controller)</text>
  <text x="104" y="208" font-size="10.5" fill="#6f42c1">Devuelve vistas HTML</text>
  <text x="104" y="230" font-size="10.5" fill="#57606a">• Controladores MVC</text>
  <text x="104" y="247" font-size="10.5" fill="#57606a">• Validación de entrada</text>
  <text x="104" y="264" font-size="10.5" fill="#57606a">• Modelos de vista (ViewModel)</text>

  <rect x="316" y="168" width="212" height="118" rx="8" fill="#fff" stroke="#e3d7f5"/>
  <text x="328" y="190" font-size="12.5" font-weight="700" fill="#1f2328">REST API (@RestController)</text>
  <text x="328" y="208" font-size="10.5" fill="#6f42c1">Devuelve JSON</text>
  <text x="328" y="230" font-size="10.5" fill="#57606a">• Endpoints REST</text>
  <text x="328" y="247" font-size="10.5" fill="#57606a">• Validación de entrada</text>
  <text x="328" y="264" font-size="10.5" fill="#57606a">• DTOs (Request / Response)</text>

  <rect x="540" y="168" width="243" height="118" rx="8" fill="#fff" stroke="#e3d7f5"/>
  <text x="552" y="190" font-size="12.5" font-weight="700" fill="#1f2328">Vistas (Thymeleaf)</text>
  <text x="552" y="212" font-size="10.5" fill="#57606a">Plantillas HTML</text>
  <text x="552" y="229" font-size="10.5" fill="#57606a">(layouts, fragments, páginas)</text>
  <text x="552" y="251" font-size="10.5" fill="#57606a">Bootstrap + Chart.js</text>

  <rect x="372" y="296" width="76" height="24" rx="12" fill="#efe9fa" stroke="#d8c9f0"/>
  <text x="410" y="312" text-anchor="middle" font-size="11" font-weight="700" fill="#5a32a3">DTOs</text>
  <path d="M410 328 V342" stroke="#8a93a6" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- ============ CAPA 2 — NEGOCIO ============ -->
  <rect x="20" y="344" width="780" height="150" rx="10" fill="#e8f1fb" stroke="#bcd6f2"/>
  <rect x="20" y="344" width="60" height="150" rx="10" fill="#185FA5"/>
  <text x="50" y="374" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">2</text>
  <text transform="translate(43,432) rotate(-90)" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="1">NEGOCIO</text>
  <text x="440" y="368" text-anchor="middle" font-size="15" font-weight="700" fill="#185FA5">Capa de Negocio</text>

  <rect x="92" y="380" width="430" height="100" rx="8" fill="#fff" stroke="#cfe0f4"/>
  <text x="104" y="402" font-size="12.5" font-weight="700" fill="#1f2328">Services (@Service) — Lógica de negocio</text>
  <text x="104" y="422" font-size="10.5" fill="#57606a">• Reglas de negocio</text>
  <text x="104" y="439" font-size="10.5" fill="#57606a">• Transacciones (@Transactional)</text>
  <text x="104" y="456" font-size="10.5" fill="#57606a">• Orquestación de casos de uso</text>
  <text x="300" y="422" font-size="10.5" fill="#57606a">• Cálculo de precio / IVA</text>
  <text x="300" y="439" font-size="10.5" fill="#57606a">• Snapshot de facturas</text>

  <rect x="540" y="380" width="243" height="100" rx="8" fill="#fff" stroke="#cfe0f4"/>
  <text x="552" y="402" font-size="12.5" font-weight="700" fill="#1f2328">Validaciones</text>
  <text x="552" y="424" font-size="10.5" fill="#57606a">• Bean Validation</text>
  <text x="552" y="441" font-size="10.5" fill="#57606a">• Validaciones de dominio</text>
  <path d="M410 494 V508" stroke="#8a93a6" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- ============ CAPA 3 — PERSISTENCIA ============ -->
  <rect x="20" y="510" width="780" height="140" rx="10" fill="#fdf0e3" stroke="#f3d3ad"/>
  <rect x="20" y="510" width="60" height="140" rx="10" fill="#d9822b"/>
  <text x="50" y="540" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">3</text>
  <text transform="translate(43,592) rotate(-90)" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff" letter-spacing="1">PERSISTENCIA</text>
  <text x="440" y="534" text-anchor="middle" font-size="15" font-weight="700" fill="#b5651d">Capa de Persistencia</text>

  <rect x="92" y="546" width="430" height="90" rx="8" fill="#fff" stroke="#f5dec1"/>
  <text x="104" y="568" font-size="12.5" font-weight="700" fill="#1f2328">Repositories (@Repository) extends JpaRepository</text>
  <text x="104" y="588" font-size="10.5" fill="#57606a">• Consultas CRUD y personalizadas</text>
  <text x="104" y="605" font-size="10.5" fill="#57606a">• Paginación y ordenamiento</text>
  <text x="104" y="622" font-size="10.5" fill="#57606a">• Especificaciones (JPA Criteria)</text>

  <rect x="540" y="546" width="243" height="90" rx="8" fill="#fff" stroke="#f5dec1"/>
  <text x="552" y="568" font-size="12.5" font-weight="700" fill="#1f2328">Mapeo Entidad ↔ DTO</text>
  <text x="552" y="590" font-size="10.5" fill="#57606a">• Mapeo manual en los Services</text>
  <text x="552" y="607" font-size="10.5" fill="#57606a">  (sin MapStruct / ModelMapper)</text>
  <path d="M410 650 V664" stroke="#8a93a6" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- ============ CAPA 4 — DATOS ============ -->
  <rect x="20" y="666" width="780" height="138" rx="10" fill="#ecf4e2" stroke="#cfe3b4"/>
  <rect x="20" y="666" width="60" height="138" rx="10" fill="#3B6D11"/>
  <text x="50" y="696" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">4</text>
  <text transform="translate(43,746) rotate(-90)" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="1">DATOS</text>
  <text x="440" y="690" text-anchor="middle" font-size="15" font-weight="700" fill="#3B6D11">Capa de Datos</text>

  <rect x="92" y="702" width="430" height="88" rx="8" fill="#fff" stroke="#d6e7bd"/>
  <text x="104" y="724" font-size="12.5" font-weight="700" fill="#1f2328">Entidades (@Entity) — Mapeo objeto-tabla (JPA)</text>
  <text x="104" y="746" font-size="10.5" fill="#57606a">• Relaciones</text>
  <text x="104" y="763" font-size="10.5" fill="#57606a">• Constraints</text>
  <text x="104" y="780" font-size="10.5" fill="#57606a">• Ciclo de vida</text>

  <rect x="540" y="702" width="243" height="88" rx="8" fill="#fff" stroke="#d6e7bd"/>
  <text x="552" y="724" font-size="12.5" font-weight="700" fill="#1f2328">Base de Datos (PostgreSQL)</text>
  <text x="552" y="746" font-size="10.5" fill="#57606a">• Tablas · Índices</text>
  <text x="552" y="763" font-size="10.5" fill="#57606a">• Constraints · Datos</text>

  <!-- ============ SIDEBAR — TRANSVERSALES ============ -->
  <text x="958" y="128" text-anchor="middle" font-size="12" font-weight="800" fill="#444c56" letter-spacing="1">TRANSVERSALES</text>

  <rect x="816" y="140" width="284" height="86" rx="9" fill="#f4f6f8" stroke="#d0d7de"/>
  <text x="830" y="160" font-size="11.5" font-weight="700" fill="#444c56">SEGURIDAD</text>
  <text x="830" y="180" font-size="10.5" fill="#1f2328" font-weight="600">Spring Security</text>
  <text x="830" y="197" font-size="10.5" fill="#57606a">JWT (API) + Sesión (Web)</text>
  <text x="830" y="214" font-size="10.5" fill="#57606a">Autenticación · Roles / Permisos</text>

  <rect x="816" y="234" width="284" height="86" rx="9" fill="#f4f6f8" stroke="#d0d7de"/>
  <text x="830" y="254" font-size="11.5" font-weight="700" fill="#444c56">EXCEPCIONES</text>
  <text x="830" y="274" font-size="10.5" fill="#1f2328" font-weight="600">@RestControllerAdvice</text>
  <text x="830" y="291" font-size="10.5" fill="#57606a">Manejo global · JSON uniforme</text>
  <text x="830" y="308" font-size="10.5" fill="#57606a">401 · 403 · 404 · 409</text>

  <rect x="816" y="328" width="284" height="72" rx="9" fill="#f4f6f8" stroke="#d0d7de"/>
  <text x="830" y="348" font-size="11.5" font-weight="700" fill="#444c56">LOGGING</text>
  <text x="830" y="368" font-size="10.5" fill="#1f2328" font-weight="600">SLF4J / Logback</text>
  <text x="830" y="385" font-size="10.5" fill="#57606a">Trazabilidad · Niveles de log</text>

  <rect x="816" y="408" width="284" height="86" rx="9" fill="#f4f6f8" stroke="#d0d7de"/>
  <text x="830" y="428" font-size="11.5" font-weight="700" fill="#444c56">AUDITORÍA</text>
  <text x="830" y="448" font-size="10.5" fill="#1f2328" font-weight="600">Tabla "auditoria" · AuditService</text>
  <text x="830" y="465" font-size="10.5" fill="#57606a">Registro de acciones</text>
  <text x="830" y="482" font-size="10.5" fill="#57606a">Visible en el dashboard</text>

  <rect x="816" y="502" width="284" height="86" rx="9" fill="#eef3f8" stroke="#cfdcea"/>
  <text x="830" y="522" font-size="11.5" font-weight="700" fill="#185FA5">COMUNICACIÓN — API REST</text>
  <text x="830" y="542" font-size="10.5" fill="#1f2328" font-weight="600">JSON (Stateless)</text>
  <text x="830" y="559" font-size="10.5" fill="#57606a">Recursos · Verbos HTTP</text>
  <text x="830" y="576" font-size="10.5" fill="#57606a">Códigos de estado</text>

  <rect x="816" y="596" width="284" height="64" rx="9" fill="#f4f6f8" stroke="#d0d7de"/>
  <text x="830" y="616" font-size="11.5" font-weight="700" fill="#444c56">DOCUMENTACIÓN</text>
  <text x="830" y="636" font-size="10.5" fill="#1f2328" font-weight="600">OpenAPI 3 (Swagger)</text>
  <text x="830" y="652" font-size="10.5" fill="#57606a">/swagger-ui.html</text>

  <rect x="816" y="668" width="284" height="120" rx="9" fill="#f4f6f8" stroke="#d0d7de"/>
  <text x="830" y="688" font-size="11.5" font-weight="700" fill="#444c56">PRINCIPIOS</text>
  <text x="830" y="708" font-size="10.5" fill="#57606a">Separación de responsabilidades</text>
  <text x="830" y="725" font-size="10.5" fill="#57606a">Bajo acoplamiento · Alta cohesión</text>
  <text x="830" y="742" font-size="10.5" fill="#57606a">Inversión de dependencias</text>
  <text x="830" y="759" font-size="10.5" fill="#57606a">Un feature por paquete</text>
  <text x="830" y="776" font-size="10.5" fill="#57606a">SOLID</text>

  <!-- ============ CONFIG + LEYENDA ============ -->
  <rect x="20" y="824" width="780" height="46" rx="9" fill="#f4f6f8" stroke="#d0d7de"/>
  <text x="34" y="852" font-size="11" font-weight="700" fill="#444c56">CONFIGURACIÓN Y ARRANQUE</text>
  <text x="250" y="852" font-size="10.5" fill="#57606a">Spring Boot · AutoConfiguration · OpenAPI/Swagger · Properties · DataSeeder</text>

  <text x="34" y="906" font-size="11" font-weight="700" fill="#444c56">LEYENDA</text>
  <rect x="110" y="897" width="12" height="12" rx="3" fill="#6f42c1"/><text x="128" y="907" font-size="10.5" fill="#57606a">Presentación</text>
  <rect x="222" y="897" width="12" height="12" rx="3" fill="#185FA5"/><text x="240" y="907" font-size="10.5" fill="#57606a">Negocio</text>
  <rect x="316" y="897" width="12" height="12" rx="3" fill="#d9822b"/><text x="334" y="907" font-size="10.5" fill="#57606a">Persistencia</text>
  <rect x="430" y="897" width="12" height="12" rx="3" fill="#3B6D11"/><text x="448" y="907" font-size="10.5" fill="#57606a">Datos</text>
  <text x="520" y="907" font-size="10.5" fill="#57606a">→ Flujo síncrono</text>

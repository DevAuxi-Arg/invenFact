# Test profile: usa H2 en memoria, no toca Postgres
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Apagar Swagger en tests
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# JWT para tests
app.jwt.secret=clave-secreta-de-pruebas-suficientemente-larga-para-hs256-0123456789
app.jwt.access-expiration-ms=3600000
app.jwt.refresh-expiration-ms=604800000
app.jwt.max-failed-attempts=5

# No sembrar admin en tests
app.seed.admin.enabled=false

# Recuperación de contraseña (sin envío real en tests)
app.mail.enabled=false
app.mail.from=no-reply@test.local
app.password-reset.expiration-minutes=30
app.password-reset.base-url=http://localhost/reset-password

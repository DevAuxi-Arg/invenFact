<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{layout :: document(titulo='Cliente', contenido=~{::main})}">
<body>
<main>

    <div class="page-header section-blue">
        <div class="page-header-icon"><i class="bi bi-person-vcard"></i></div>
        <div class="page-header-body">
            <div class="page-header-eyebrow"
                 th:text="${modo == 'crear'} ? 'Crear · Cliente' : 'Editar · Cliente'"></div>
            <h1 class="page-header-title"
                th:text="${modo == 'crear'} ? 'Nuevo cliente' : 'Editar cliente'"></h1>
        </div>
    </div>

    <div class="app-card">
        <div class="card-body form-section section-blue">
            <form th:action="${modo == 'crear'} ? @{/clientes} : @{/clientes/{id}(id=${id})}"
                  th:object="${cliente}" method="post">

                <div class="row">
                    <div class="col-md-7 mb-3">
                        <label for="nombre" class="form-label">Nombre / Razón social <span class="text-danger">*</span></label>
                        <input type="text" id="nombre" class="form-control" th:field="*{nombre}"
                               th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                    </div>
                    <div class="col-md-5 mb-3">
                        <label for="documento" class="form-label">Documento / CUIT</label>
                        <input type="text" id="documento" class="form-control" th:field="*{documento}"
                               th:classappend="${#fields.hasErrors('documento')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('documento')}" th:errors="*{documento}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="condicionIva" class="form-label">Condición frente al IVA</label>
                    <select id="condicionIva" class="form-select" th:field="*{condicionIva}">
                        <option th:each="c : ${condiciones}" th:value="${c}"
                                th:text="${#strings.replace(c, '_', ' ')}"></option>
                    </select>
                    <div class="form-text">Si es <strong>EXENTO</strong>, sus facturas no llevan IVA.</div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="telefono" class="form-label">Teléfono</label>
                        <input type="text" id="telefono" class="form-control" th:field="*{telefono}">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="direccion" class="form-label">Dirección</label>
                    <input type="text" id="direccion" class="form-control" th:field="*{direccion}">
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/clientes}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Cancelar
                    </a>
                    <button type="submit" class="btn btn-section-blue">
                        <i class="bi bi-check-circle"></i>
                        <span th:text="${modo == 'crear'} ? 'Crear' : 'Guardar'"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

</main>
</body>
</html>

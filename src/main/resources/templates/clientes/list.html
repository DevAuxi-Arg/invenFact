<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{layout :: document(titulo='Clientes', contenido=~{::main})}">
<body>
<main>

    <div class="page-header section-blue">
        <div class="page-header-icon"><i class="bi bi-person-vcard"></i></div>
        <div class="page-header-body">
            <div class="page-header-eyebrow">Ventas</div>
            <h1 class="page-header-title">Clientes</h1>
        </div>
        <div class="page-header-actions">
            <a th:href="@{/clientes/nuevo}" class="btn btn-section-blue">
                <i class="bi bi-person-plus"></i> Nuevo cliente
            </a>
        </div>
    </div>

    <div class="app-card mb-3">
        <div class="card-body form-section">
            <form th:action="@{/clientes}" method="get">
                <div class="row g-2">
                    <div class="col-md-10">
                        <input type="text" name="texto" class="form-control"
                               placeholder="Buscar por nombre o documento…" th:value="${texto}">
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="submit" class="btn btn-outline-section-blue">
                            <i class="bi bi-search"></i> Buscar
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="app-card">
        <div class="table-responsive">
            <table class="table table-hover app-table cards-md">
                <thead>
                <tr>
                    <th>Nombre</th>
                    <th style="width: 160px">Documento</th>
                    <th style="width: 190px">Condición IVA</th>
                    <th>Contacto</th>
                    <th style="width: 120px" class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(clientes)}">
                    <td colspan="5" class="text-center text-muted py-4">
                        <i class="bi bi-inbox" style="font-size: 1.6rem; opacity: 0.5;"></i><br>
                        No hay clientes cargados.
                    </td>
                </tr>
                <tr th:each="c : ${clientes}">
                    <td class="cell-main"><strong th:text="${c.nombre()}"></strong></td>
                    <td data-label="Documento"><span class="text-muted" th:text="${c.documento() ?: '—'}"></span></td>
                    <td data-label="Condición IVA">
                        <span class="badge-cat"
                              th:text="${c.condicionIva() != null ? #strings.replace(c.condicionIva(), '_', ' ') : '—'}"></span>
                    </td>
                    <td class="text-muted" style="font-size:13px" data-label="Contacto">
                        <span th:if="${c.email() != null}" th:text="${c.email()}"></span>
                        <span th:if="${c.telefono() != null}"
                              th:text="${(c.email() != null ? ' · ' : '') + c.telefono()}"></span>
                    </td>
                    <td class="text-end cell-actions">
                        <a th:href="@{/clientes/{id}/editar(id=${c.id()})}"
                           class="btn btn-sm btn-outline-section-blue" title="Editar">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:if="${isAdmin or isCoadmin}"
                              th:action="@{/clientes/{id}/eliminar(id=${c.id()})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('¿Eliminar este cliente?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Eliminar">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:with="qs=${(texto != null and !#strings.isEmpty(texto)) ? 'texto=' + texto + '&size=' + page.size + '&' : 'size=' + page.size + '&'},
                  urlBase='/clientes?' + qs">
        <div th:replace="~{fragments/paginacion :: paginacion(page=${page}, urlBase=${urlBase}, variante='blue')}"></div>
    </div>

</main>
</body>
</html>

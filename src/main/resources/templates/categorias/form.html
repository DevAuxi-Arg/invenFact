<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{layout :: document(titulo='Categoría', contenido=~{::main})}">
<body>
<main>

    <!-- Header de sección -->
    <div class="page-header section-blue">
        <div class="page-header-icon">
            <i class="bi bi-tags" aria-hidden="true"></i>
        </div>
        <div class="page-header-body">
            <div class="page-header-eyebrow"
                 th:text="${modo == 'crear'} ? 'Crear · Categoría' : 'Editar · Categoría'"></div>
            <h1 class="page-header-title"
                th:text="${modo == 'crear'} ? 'Nueva categoría' : 'Editar categoría'"></h1>
        </div>
        <div class="page-header-actions d-flex gap-2">
            <a th:href="@{/categorias}" class="btn btn-light">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
            <button type="submit" form="formCategoria" class="btn btn-section-blue">
                <i class="bi bi-check-circle"></i>
                <span th:text="${modo == 'crear'} ? 'Crear' : 'Guardar'"></span>
            </button>
        </div>
    </div>

    <div class="app-card">
        <div class="card-body form-section section-blue">
            <form id="formCategoria"
                  th:action="${modo == 'crear'} ? @{/categorias} : @{/categorias/{id}(id=${id})}"
                  th:object="${categoria}" method="post">

                <!-- Resumen de errores de validación -->
                <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                    <strong><i class="bi bi-exclamation-triangle"></i> Revisá estos campos:</strong>
                    <ul class="mb-0 mt-1">
                        <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                    </ul>
                </div>

                <div class="mb-3">
                    <label for="nombre" class="form-label">
                        Nombre <span class="text-danger">*</span>
                    </label>
                    <input type="text" id="nombre" class="form-control"
                           th:field="*{nombre}"
                           th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}"
                         th:errors="*{nombre}"></div>
                </div>

                <div class="mb-3">
                    <label for="descripcion" class="form-label">Descripción</label>
                    <textarea id="descripcion" class="form-control" rows="3"
                              th:field="*{descripcion}"
                              th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}"
                         th:errors="*{descripcion}"></div>
                </div>

                <div class="mb-3">
                    <label for="iconoUrl" class="form-label">Ícono de la categoría (URL · PNG o GIF)</label>
                    <input type="text" id="iconoUrl" class="form-control"
                           placeholder="https://…/icono.png"
                           th:field="*{iconoUrl}"
                           th:classappend="${#fields.hasErrors('iconoUrl')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('iconoUrl')}"
                         th:errors="*{iconoUrl}"></div>
                    <div class="mt-2">
                        <img id="iconoPreview" alt="Vista previa del ícono"
                             class="img-thumbnail" style="max-height: 80px; display: none;">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="alicuotaIva" class="form-label">Alícuota de IVA (%)</label>
                    <div class="input-group" style="max-width: 220px;">
                        <input type="number" id="alicuotaIva" class="form-control"
                               step="0.01" min="0" max="100"
                               th:field="*{alicuotaIva}"
                               th:classappend="${#fields.hasErrors('alicuotaIva')} ? 'is-invalid'">
                        <span class="input-group-text">%</span>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('alicuotaIva')}"
                             th:errors="*{alicuotaIva}"></div>
                    </div>
                    <div class="form-text">21 % general · 10,5 % reducido · 0 % exento. Determina el IVA de los productos de esta categoría.</div>
                </div>

                <div class="mb-4">
                    <label for="stockMinimo" class="form-label">Stock mínimo de la categoría</label>
                    <input type="number" id="stockMinimo" class="form-control" min="0"
                           style="max-width: 220px;"
                           th:field="*{stockMinimo}"
                           th:classappend="${#fields.hasErrors('stockMinimo')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('stockMinimo')}"
                         th:errors="*{stockMinimo}"></div>
                    <div class="form-text">
                        Avisa cuando un producto de esta categoría baja a este stock.
                        <strong>0</strong> = usa el mínimo global. El mínimo definido en cada producto tiene prioridad sobre este.
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/categorias}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Cancelar
                    </a>
                    <button type="submit" class="btn btn-section-blue">
                        <i class="bi bi-check-circle"></i>
                        <span th:text="${modo == 'crear'} ? 'Crear' : 'Guardar'"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Vista previa en vivo del ícono -->
    <script>
        (function () {
            var input = document.getElementById('iconoUrl');
            var preview = document.getElementById('iconoPreview');
            if (!input || !preview) return;
            function update() {
                var v = input.value.trim();
                if (v) { preview.src = v; preview.style.display = ''; }
                else { preview.removeAttribute('src'); preview.style.display = 'none'; }
            }
            input.addEventListener('input', update);
            preview.addEventListener('error', function () { preview.style.display = 'none'; });
            update(); // muestra el ícono ya cargado al editar
        })();
    </script>

</main>
</body>
</html>

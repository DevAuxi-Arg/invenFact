<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso · Productos API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #26193f;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #2f2050;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 2.5rem 2.25rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
        }
        .login-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.75rem;
        }
        .login-brand .brand-icon {
            width: 62px; height: 62px;
            background: linear-gradient(135deg, #1a2540, #2a3f70);
            border-radius: 13px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(100, 160, 255, 0.28);
        }
        .login-brand img { width: 62px; height: 62px; object-fit: contain; }
        .login-brand .brand-main { font-size: 17px; font-weight: 700; color: #e8eaf0; }
        .login-brand .brand-sub {
            font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
            text-transform: uppercase; color: #a371f7;
        }
        .login-card label { font-size: 13px; font-weight: 600; color: #9fb0c8; margin-bottom: 6px; }
        .login-card .form-control {
            background: #0d0f14; border: 1px solid #2a3242; color: #e8eaf0;
            border-radius: 9px; padding: 10px 13px;
        }
        .login-card .form-control:focus {
            background: #0d0f14; color: #e8eaf0;
            border-color: #a371f7; box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.25);
        }
        .btn-login {
            background: #7c3aed; color: #fff; border: none; font-weight: 600;
            border-radius: 9px; padding: 11px; width: 100%;
            box-shadow: 0 4px 14px rgba(124, 58, 237, 0.35);
            transition: transform .12s ease, box-shadow .2s ease, background .2s ease;
        }
        .btn-login:hover {
            background: #6d28d9; color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.5);
        }
        /* Feedback claro al presionar: se hunde + sombra interna */
        .btn-login:active {
            background: #5b21b6; color: #fff;
            transform: translateY(0) scale(0.97);
            box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.30), 0 2px 8px rgba(124, 58, 237, 0.30);
        }
        .btn-login:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(163, 113, 247, 0.5);
        }
        .btn-login:disabled { opacity: .9; cursor: progress; transform: none; }
        .btn-login .spinner {
            width: 16px; height: 16px; display: inline-block; vertical-align: -3px;
            border: 2px solid rgba(255, 255, 255, 0.4); border-top-color: #fff;
            border-radius: 50%; animation: btnspin .6s linear infinite;
        }
        @keyframes btnspin { to { transform: rotate(360deg); } }
        .login-alert { font-size: 13.5px; border-radius: 9px; border: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-brand">
        <a th:href="@{/}" class="brand-icon" title="Ir al inicio" style="text-decoration:none; cursor:pointer;">
            <img th:src="@{/img/logo.png}" alt="Ir al inicio">
        </a>
        <div>
            <div class="brand-main">Productos API</div>
            <div class="brand-sub">WillySoft</div>
        </div>
    </div>

    <div th:if="${param.error}" class="alert alert-danger login-alert" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i> Email o contraseña incorrectos.
    </div>
    <div th:if="${param.logout}" class="alert alert-success login-alert" role="alert">
        <i class="bi bi-check-circle me-1"></i> Sesión cerrada correctamente.
    </div>
    <div th:if="${mensaje}" class="alert alert-success login-alert" role="alert">
        <i class="bi bi-check-circle me-1"></i> <span th:text="${mensaje}"></span>
    </div>

    <form th:action="@{/login}" method="post" id="loginForm">
        <div class="mb-3">
            <label for="username">Email</label>
            <input type="email" id="username" name="username" class="form-control"
                   placeholder="tu@correo.com" required autofocus>
        </div>
        <div class="mb-4">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login" id="btnEntrar">
            <span class="btn-label"><i class="bi bi-box-arrow-in-right me-1"></i> Entrar</span>
        </button>
    </form>

    <script>
        (function () {
            var form = document.getElementById('loginForm');
            var btn = document.getElementById('btnEntrar');
            if (!form || !btn) return;
            form.addEventListener('submit', function () {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Entrando…';
            });
        })();
    </script>

    <div class="text-center mt-3">
        <a th:href="@{/forgot-password}" style="color:#7a8ba6; font-size:13px; text-decoration:none;">
            ¿Olvidaste tu contraseña?
        </a>
    </div>
</div>

</body>
</html>

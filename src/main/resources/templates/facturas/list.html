<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{layout :: document(titulo='Facturas', contenido=~{::main})}">
<body>
<main>

    <style>
        .estado-EMITIDA { background:#EAF3DE; color:#3B6D11; }
        .estado-ANULADA { background:#fde2e2; color:#a51b1b; }
        .estado-badge { font-size:11px; font-weight:600; padding:4px 9px; border-radius:6px; }
        .sort-link { color:inherit; text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
        .sort-link:hover { color:#6d28d9; }
        .sort-link .arrow { color:#6d28d9; font-size:11px; }
    </style>

    <div class="page-header section-green">
        <div class="page-header-icon"><i class="bi bi-receipt"></i></div>
        <div class="page-header-body">
            <div class="page-header-eyebrow">Ventas</div>
            <h1 class="page-header-title">Facturas</h1>
        </div>
        <div class="page-header-actions">
            <a th:href="@{/facturas/nueva}" class="btn btn-section-green">
                <i class="bi bi-plus-circle"></i> Nueva factura
            </a>
        </div>
    </div>

    <div class="app-card">
        <div class="table-responsive">
            <table class="table table-hover app-table">
                <thead>
                <tr>
                    <th style="width: 130px">Número</th>
                    <th style="width: 150px">
                        <a class="sort-link"
                           th:href="@{/facturas(sort='fecha,' + (${sortField == 'fecha' and sortDir == 'asc'} ? 'desc' : 'asc'))}">
                            Fecha
                            <span class="arrow" th:if="${sortField == 'fecha'}"
                                  th:text="${sortDir == 'asc'} ? '▲' : '▼'"></span>
                        </a>
                    </th>
                    <th>
                        <a class="sort-link"
                           th:href="@{/facturas(sort='clienteNombre,' + (${sortField == 'clienteNombre' and sortDir == 'asc'} ? 'desc' : 'asc'))}">
                            Cliente
                            <span class="arrow" th:if="${sortField == 'clienteNombre'}"
                                  th:text="${sortDir == 'asc'} ? '▲' : '▼'"></span>
                        </a>
                    </th>
                    <th class="text-end">
                        <a class="sort-link"
                           th:href="@{/facturas(sort='total,' + (${sortField == 'total' and sortDir == 'asc'} ? 'desc' : 'asc'))}">
                            Total (ARS)
                            <span class="arrow" th:if="${sortField == 'total'}"
                                  th:text="${sortDir == 'asc'} ? '▲' : '▼'"></span>
                        </a>
                    </th>
                    <th style="width: 110px">Estado</th>
                    <th style="width: 90px" class="text-end">Ver</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(facturas)}">
                    <td colspan="6" class="text-center text-muted py-4">
                        <i class="bi bi-inbox" style="font-size: 1.6rem; opacity: 0.5;"></i><br>
                        No hay facturas emitidas.
                    </td>
                </tr>
                <tr th:each="f : ${facturas}">
                    <td><strong th:text="${f.numero()}"></strong></td>
                    <td class="text-muted" style="font-size:13px"
                        th:text="${#temporals.format(f.fecha(), 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <span th:text="${f.clienteNombre()}"></span>
                        <span class="text-muted" th:if="${f.clienteDocumento()}"
                              th:text="'· ' + ${f.clienteDocumento()}"></span>
                    </td>
                    <td class="text-end fw-semibold"
                        th:text="${'$' + #numbers.formatDecimal(f.total(), 1, 'COMMA', 2, 'POINT')}"></td>
                    <td>
                        <span class="estado-badge" th:classappend="'estado-' + ${f.estado()}"
                              th:text="${f.estado()}"></span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/facturas/{id}(id=${f.id()})}"
                           class="btn btn-sm btn-outline-section-green" title="Ver">
                            <i class="bi bi-eye"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:with="urlBase='/facturas?sort=' + ${sortField} + ',' + ${sortDir} + '&size=' + ${page.size} + '&'">
        <div th:replace="~{fragments/paginacion :: paginacion(page=${page}, urlBase=${urlBase}, variante='green')}"></div>
    </div>

</main>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Restablecer contraseña · Productos API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background:#26193f; font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh;
               display:flex; align-items:center; justify-content:center; }
        .login-card { background:#2f2050; border:1px solid rgba(255,255,255,0.06); border-radius:18px;
                      padding:2.5rem 2.25rem; width:100%; max-width:400px; box-shadow:0 18px 50px rgba(0,0,0,0.45); }
        .login-card h1 { font-size:18px; font-weight:700; color:#e8eaf0; margin-bottom:6px; }
        .login-card .lead-sub { font-size:13px; color:#7a8ba6; margin-bottom:1.5rem; }
        .login-card label { font-size:13px; font-weight:600; color:#9fb0c8; margin-bottom:6px; }
        .login-card .form-control { background:#0d0f14; border:1px solid #2a3242; color:#e8eaf0;
                                    border-radius:9px; padding:10px 13px; }
        .login-card .form-control:focus { background:#0d0f14; color:#e8eaf0; border-color:#a371f7;
                                          box-shadow:0 0 0 3px rgba(124,58,237,0.25); }
        .btn-login { background:#7c3aed; color:#fff; border:none; font-weight:600; border-radius:9px;
                     padding:11px; width:100%; }
        .btn-login:hover { background:#6d28d9; color:#fff; }
        .login-alert { font-size:13.5px; border-radius:9px; border:none; }
    </style>
</head>
<body>
<div class="login-card">
    <h1><i class="bi bi-shield-lock me-1"></i> Nueva contraseña</h1>
    <p class="lead-sub">Elegí una contraseña de al menos 8 caracteres.</p>

    <div th:if="${error}" class="alert alert-danger login-alert" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i> <span th:text="${error}"></span>
    </div>

    <div th:if="${token == null}" class="alert alert-warning login-alert" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i> Falta el token de recuperación en el enlace.
    </div>

    <form th:if="${token != null}" th:action="@{/reset-password}" method="post">
        <input type="hidden" name="token" th:value="${token}">
        <div class="mb-4">
            <label for="passwordNueva">Nueva contraseña</label>
            <input type="password" id="passwordNueva" name="passwordNueva" class="form-control"
                   placeholder="••••••••" minlength="8" required autofocus>
        </div>
        <button type="submit" class="btn-login">
            <i class="bi bi-check-circle me-1"></i> Restablecer contraseña
        </button>
    </form>

    <div class="text-center mt-3">
        <a th:href="@{/login}" style="color:#7a8ba6; font-size:13px; text-decoration:none;">
            <i class="bi bi-arrow-left"></i> Volver al inicio de sesión
        </a>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{layout :: document(titulo='Catálogo por categoría', contenido=~{::main})}">
<body>
<main>

    <!-- Header de sección -->
    <div class="page-header section-green">
        <div class="page-header-icon">
            <i class="bi bi-cash-stack" aria-hidden="true"></i>
        </div>
        <div class="page-header-body">
            <div class="page-header-eyebrow">Por categoría</div>
            <h1 class="page-header-title">Lista de precios</h1>
        </div>
        <div class="page-header-actions d-flex flex-wrap gap-2">
            <a th:href="@{/productos/catalogo/export/excel(categoriaIds=${categoriaIds})}"
               class="btn btn-outline-section-green">
                <i class="bi bi-file-earmark-excel"></i> Excel
            </a>
            <a th:href="@{/productos/catalogo/export/pdf(categoriaIds=${categoriaIds})}"
               class="btn btn-outline-section-green">
                <i class="bi bi-file-earmark-pdf"></i> PDF
            </a>
            <a th:href="@{/productos}" class="btn btn-outline-section-green">
                <i class="bi bi-list-ul"></i> Ver catálogo
            </a>
        </div>
    </div>

    <!-- Filtro de categorías (una o varias) -->
    <div class="app-card mb-3">
        <div class="card-body form-section section-green">
            <form th:action="@{/productos/catalogo}" method="get">
                <div class="row g-2 align-items-end">
                    <div class="col-md-9">
                        <label for="filtroCategorias" class="form-label">Categorías (vacío = todas)</label>
                        <select id="filtroCategorias" name="categoriaIds" multiple class="form-select">
                            <option th:each="cat : ${categorias}"
                                    th:value="${cat.id()}"
                                    th:attr="data-icon=${cat.iconoUrl()}"
                                    th:text="${cat.nombre()}"
                                    th:selected="${categoriaIds != null and categoriaIds.contains(cat.id())}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 d-grid gap-2">
                        <button type="submit" class="btn btn-section-green">
                            <i class="bi bi-funnel"></i> Filtrar
                        </button>
                        <a th:href="@{/productos/catalogo}" class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-x-circle"></i> Limpiar
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Estado vacío -->
    <div th:if="${#lists.isEmpty(grupos)}" class="app-card">
        <div class="card-body text-center text-muted py-5">
            <i class="bi bi-inbox" style="font-size: 1.8rem; opacity: 0.5;"></i><br>
            No hay productos para mostrar.
        </div>
    </div>

    <!-- Lista de precios clásica: titular por categoría + productos debajo (corte de control) -->
    <div class="app-card" th:unless="${#lists.isEmpty(grupos)}">
        <div class="card-body">

            <div th:each="grupo : ${grupos}" class="mb-4">

                <!-- Titular de la categoría -->
                <div class="d-flex align-items-center gap-2 mb-2 pb-2"
                     style="border-bottom: 2px solid #3B6D11;">
                    <img th:if="${grupo.categoria().iconoUrl() != null and !grupo.categoria().iconoUrl().isEmpty()}"
                         th:src="${grupo.categoria().iconoUrl()}" alt=""
                         style="width:34px;height:34px;object-fit:contain;flex:none;"
                         onerror="this.style.display='none'">
                    <h2 class="h4 mb-0 fw-bold" th:text="${grupo.categoria().nombre()}">Categoría</h2>
                    <span class="badge-cat ms-2"
                          th:text="${'IVA ' + (grupo.categoria().alicuotaIva() != null ? #numbers.formatDecimal(grupo.categoria().alicuotaIva(), 1, 2) : '0,00') + ' %'}"></span>
                </div>

                <!-- Productos de la categoría -->
                <div class="table-responsive">
                    <table class="table table-hover app-table mb-0">
                        <thead>
                        <tr>
                            <th style="width: 56px"></th>
                            <th>Producto</th>
                            <th class="text-end" style="width: 170px">Precio final (ARS)</th>
                            <th class="text-end" style="width: 170px">Precio final (USD)</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="p : ${grupo.productos()}">
                            <td>
                                <img th:if="${p.imagenUrl() != null and !p.imagenUrl().isEmpty()}"
                                     th:src="${p.imagenUrl()}" alt=""
                                     style="width:42px;height:42px;object-fit:cover;border-radius:6px;"
                                     onerror="this.style.display='none'">
                            </td>
                            <td>
                                <strong th:text="${p.nombre()}"></strong>
                                <div class="small text-muted" th:text="${p.descripcion()}"></div>
                            </td>
                            <td class="text-end fw-semibold"
                                th:text="${'$' + #numbers.formatDecimal(p.precioFinalArs(), 1, 'COMMA', 2, 'POINT')}"></td>
                            <td class="text-end text-muted"
                                th:text="${p.precioFinalUsd() != null ? 'US$' + #numbers.formatDecimal(p.precioFinalUsd(), 1, 'COMMA', 2, 'POINT') : ''}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- Total general -->
    <div th:unless="${#lists.isEmpty(grupos)}" class="text-end text-muted small mt-2">
        <span th:text="${#lists.size(grupos)}"></span> categorías ·
        <span th:text="${totalProductos}"></span> productos en total
    </div>

    <!-- Multi-select de categorías con íconos (Tom Select) -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <script>
        (function () {
            if (typeof TomSelect === 'undefined') return;
            var sel = document.getElementById('filtroCategorias');
            if (!sel) return;
            var ICONS = {};
            Array.prototype.forEach.call(sel.options, function (o) {
                var u = o.getAttribute('data-icon');
                if (u) ICONS[o.value] = u;
            });
            function img(data) {
                var u = ICONS[data.value];
                return u
                    ? '<img src="' + u + '" style="width:20px;height:20px;object-fit:contain;margin-right:8px;vertical-align:middle;" onerror="this.style.display=\'none\'">'
                    : '';
            }
            new TomSelect('#filtroCategorias', {
                plugins: ['remove_button'],
                dropdownParent: 'body',
                render: {
                    option: function (data, escape) {
                        return '<div class="d-flex align-items-center">' + img(data) + escape(data.text) + '</div>';
                    },
                    item: function (data, escape) {
                        return '<div class="d-flex align-items-center">' + img(data) + escape(data.text) + '</div>';
                    }
                }
            });
        })();
    </script>

</main>
</body>
</html>

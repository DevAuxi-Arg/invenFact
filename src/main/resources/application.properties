spring.application.name=productos-api

# Datasource (variables de entorno con valores por defecto para desarrollo local)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/productos_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones acotado: Supabase (plan free) limita el pooler a 15 conexiones.
# Con un pool chico, la app (y el solapamiento de instancias en cada redeploy) no lo agota.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=1

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Server (PORT lo inyecta Render; SERVER_PORT para uso local; 8080 por defecto)
server.port=${PORT:${SERVER_PORT:8080}}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# JWT (la clave debe tener al menos 32 caracteres para HS256)
app.jwt.secret=${JWT_SECRET:cambia-esta-clave-secreta-por-una-larga-y-aleatoria-en-produccion-1234567890}
app.jwt.access-expiration-ms=${JWT_ACCESS_EXP:3600000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXP:604800000}
app.jwt.max-failed-attempts=${JWT_MAX_FAILED:5}

# Semilla del primer administrador (cambiar credenciales en producción)
app.seed.admin.enabled=${SEED_ADMIN_ENABLED:true}
app.seed.admin.nombre=${SEED_ADMIN_NOMBRE:Administrador}
app.seed.admin.email=${SEED_ADMIN_EMAIL:admin@willysoft.com}
app.seed.admin.password=${SEED_ADMIN_PASSWORD:Admin123!}
app.seed.admin.recovery-email=${SEED_ADMIN_RECOVERY_EMAIL:}

# Recuperación de contraseña
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@willysoft.com}
app.password-reset.expiration-minutes=${RESET_EXP_MIN:30}
app.password-reset.base-url=${RESET_BASE_URL:http://localhost:8080/reset-password}

# SMTP — para enviar correos reales, completar MAIL_USERNAME/MAIL_PASSWORD y poner MAIL_ENABLED=true
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
